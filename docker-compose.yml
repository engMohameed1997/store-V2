version: "3.9"

services:
  # ============================================
  # PostgreSQL Database (internal only — no external port)
  # ============================================
  db:
    image: postgres:16-alpine
    container_name: store-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-store_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-store_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-store_user} -d ${DB_NAME:-store_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - store-network
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Next.js Application (internal only — exposed via nginx)
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: store-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: "postgresql://${DB_USER:-store_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-store_db}?schema=public"

      # Migrations
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}

      # JWT Secrets (CRITICAL)
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}

      # App Config
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}

      # Admin Panel
      ADMIN_PATH_PREFIX: ${ADMIN_PATH_PREFIX:-mx-panel}
      ADMIN_IP_ALLOWLIST: ${ADMIN_IP_ALLOWLIST:-}

      # Proxy (always true — nginx is the reverse proxy)
      TRUSTED_IP_HEADER: x-forwarded-for
      BEHIND_REVERSE_PROXY: "true"

      # Cron
      CRON_SECRET: ${CRON_SECRET:?CRON_SECRET is required}

      # Upstash Redis (Rate Limiting & Cache)
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:?UPSTASH_REDIS_REST_URL is required}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:?UPSTASH_REDIS_REST_TOKEN is required}

      # Telegram Bot (optional)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}

      # AI Chatbot
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_BASE_URL: ${AI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # MinIO (Object Storage for Uploads)
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-/minio}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-store_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-store-uploads}
    networks:
      - store-network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "3.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # MinIO — S3-Compatible Object Storage for Uploads
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: store-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-store_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    networks:
      - store-network
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Nginx — Reverse Proxy + SSL Termination
  # Run ./scripts/init-ssl.sh first to get certificates
  # ============================================
  nginx:
    image: nginx:1.27-alpine
    container_name: store-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - store-network
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Certbot — Auto-renew SSL every 12 hours
  # ============================================
  certbot:
    image: certbot/certbot:latest
    container_name: store-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  store-network:
    driver: bridge
