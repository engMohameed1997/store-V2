version: "3.9"

# Development mode: Only runs PostgreSQL
# App runs locally with `npm run dev` for hot reload
services:
  db:
    image: postgres:16-alpine
    container_name: store-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-store_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-store_password123}
      POSTGRES_DB: ${DB_NAME:-store_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-store_user} -d ${DB_NAME:-store_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
    driver: local
